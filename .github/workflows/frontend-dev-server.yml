name: Frontend Dev Server Deploy

on:
  push:
    branches: [infra/IEUM-SRV-10]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend_dev_server
  cancel-in-progress: true

env:
  NODE_VERSION: ${{ secrets.NODE_VERSION }}
  IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
  CONTAINER_NAME: ${{ secrets.CONTAINER_NAME }}
  DOCKER_NETWORK: ${{ secrets.DOCKER_NETWORK }}
  FRONTEND_IP: ${{ secrets.FRONTEND_IP }}
  ENV_DIR: ${{ secrets.FRONTEND_ENV_DIR }}
  ENV_FILE: ${{ secrets.FRONTEND_ENV_FILE }}

jobs:
  deploy:
    name: Deploy Dev to Self Hosted Server
    runs-on:
      group: ieum_dev_server
      labels: [self-hosted, linux, x64, ieum-frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --run --passWithNoTests

      - name: Build frontend
        run: npx vite build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Write nginx config
        run: |
          mkdir -p .deploy

          cat > .deploy/default.conf <<'EOF'
          server {
            listen 80;
            server_name _;

            root /usr/share/nginx/html;
            index index.html;

            location / {
              try_files $uri $uri/ /index.html;
            }

            location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
              expires 30d;
              add_header Cache-Control "public, immutable";
              try_files $uri =404;
            }
          }
          EOF

      - name: Write Dockerfile
        run: |
          cat > Dockerfile.ci <<'EOF'
          FROM nginx:1.29-alpine
          COPY dist /usr/share/nginx/html
          COPY .deploy/default.conf /etc/nginx/conf.d/default.conf
          EXPOSE 80
          EOF

      - name: Sync frontend env file to server
        run: |
          mkdir -p "$ENV_DIR"

          tee "$ENV_FILE" > /dev/null <<EOF
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          NODE_ENV=production
          EOF

          chmod 600 "$ENV_FILE"

      - name: Build Docker image
        run: |
          docker build \
            -f Dockerfile.ci \
            -t "$IMAGE_NAME:${{ github.sha }}" \
            -t "$IMAGE_NAME:latest" .

      - name: Restart frontend container
        run: |
          docker network inspect "$DOCKER_NETWORK" >/dev/null 2>&1 \
            || docker network create --subnet 10.10.10.0/24 "$DOCKER_NETWORK"

          docker rm -f "$CONTAINER_NAME" >/dev/null 2>&1 || true

          docker run -d \
            --name "$CONTAINER_NAME" \
            --restart unless-stopped \
            --network "$DOCKER_NETWORK" \
            --ip "$FRONTEND_IP" \
            --env-file "$ENV_FILE" \
            "$IMAGE_NAME:latest"

      - name: Health check
        run: |
          sleep 3
          curl -fsS "http://$FRONTEND_IP/" >/dev/null